name: Build & Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      timeout-minutes: 20

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: maya-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: maya-debug-apk
        path: apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: apk/app-debug.apk
        tag_name: v${{ github.run_number }}.${{ github.run_attempt }}
        name: MAYA Assistant v${{ github.run_number }}
        body: |
          ## 📱 MAYA AI Voice Assistant

          ### ✅ Features
          - Free Wake Word Detection (SpeechRecognizer-based, no paid SDK)
          - Voice Authentication (3-slot enrollment)
          - Screen Reading & OCR (ML Kit Text Recognition)
          - Face Recognition (ML Kit Face Detection)
          - Accessibility Automation (Smart click, typing, UI tree)
          - App Lock & Pattern/Biometric Security
          - Call Assistant & Notification Reader
          - Gemini Live AI integration
          - Overlay Orb (Jarvis-style UI)
          - Multi-language support (EN, BN, HI, CRS)

          ### 🔧 Build Info
          - Package: `com.maya.assistant`
          - Version: 8.0.0 (versionCode 99)
          - Min SDK: 24 | Target SDK: 35
          - Run: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
